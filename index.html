<style>
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #334155;
  --border: #475569; --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --primary: #3b82f6; --primary-dim: #1e40af; --success: #22c55e;
  --warning: #f59e0b; --danger: #ef4444; --info: #06b6d4;
  --accent1: #8b5cf6; --accent2: #ec4899;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; z-index:10; }
.sidebar-logo { padding: 0 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.sidebar-logo h2 { font-size: 15px; color: var(--primary); letter-spacing: .5px; }
.sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 4px; }
.nav-item { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .15s; display:flex; align-items:center; gap:8px; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--primary-dim); color: #fff; border-left: 3px solid var(--primary); }
.nav-icon { font-size: 16px; width:20px; text-align:center; }
.main { margin-left: 240px; flex:1; padding: 24px 32px; min-height: 100vh; }
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 600; }
.page-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
.kpi-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; }
.kpi-value { font-size: 28px; font-weight: 700; margin-top: 6px; }
.kpi-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; display:flex; align-items:center; gap:8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
@media (max-width: 1200px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--surface2); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text2); text-transform: uppercase; font-size: 10px; letter-spacing: .5px; position:sticky; top:0; }
tbody td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: rgba(59,130,246,.08); }
.table-wrap { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); }
.badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; display: inline-block; }
.badge-high { background: rgba(34,197,94,.15); color: var(--success); }
.badge-medium { background: rgba(245,158,11,.15); color: var(--warning); }
.badge-low { background: rgba(239,68,68,.15); color: var(--danger); }
.badge-info { background: rgba(6,182,212,.15); color: var(--info); }
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filter-bar select, .filter-bar input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 6px; font-size: 12px; min-width: 140px; }
.filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--primary); }
.filter-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
.btn { padding: 7px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); }
.stat-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.text-success { color: var(--success); }
.text-warning { color: var(--warning); }
.text-danger { color: var(--danger); }
.text-info { color: var(--info); }
.text-primary { color: var(--primary); }
.text-accent { color: var(--accent1); }
.text-muted { color: var(--text3); }
.deal-sheet { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; cursor:pointer; transition: all .15s; }
.deal-sheet:hover { border-color: var(--primary); }
.deal-sheet-header { display: flex; justify-content: space-between; align-items: center; }
.deal-sheet-body { margin-top: 12px; font-size: 12px; color: var(--text2); white-space: pre-wrap; line-height: 1.6; max-height: 200px; overflow-y: auto; }
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 20px; cursor: pointer; font-size: 13px; color: var(--text3); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.search-box { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 6px; font-size: 13px; width: 100%; margin-bottom: 16px; }
.search-box:focus { outline: none; border-color: var(--primary); }
.empty-state { text-align: center; padding: 48px; color: var(--text3); }
.expand-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 11px; }
.severity-critical { color: var(--danger); font-weight: 700; }
.severity-high { color: var(--warning); font-weight: 600; }
.severity-medium { color: var(--info); }
.severity-low { color: var(--text3); }
</style>
</head>

<script type="text/babel">
const { useState, useMemo, useCallback, useEffect } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, LineChart, Line, Legend, ScatterChart, Scatter, ZAxis } = Recharts;

// Load embedded data
const DATA = JSON.parse(document.getElementById('app-data').textContent);

const fmt = (n) => n == null ? '—' : typeof n === 'number' ? n.toLocaleString('en-US', {maximumFractionDigits:0}) : n;
const fmtM = (n) => n == null ? '—' : '$' + (n/1e6).toFixed(1) + 'M';
const fmtK = (n) => n == null ? '—' : '$' + (n/1e3).toFixed(0) + 'K';
const fmtD = (n) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});
const fmtSF = (n) => n == null || n === 0 ? '—' : fmt(Math.round(n)) + ' SF';
const pct = (n) => n == null ? '—' : (n*100).toFixed(1) + '%';

const COLORS = ['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16','#a855f7'];

const ConfBadge = ({label}) => {
  const cls = label === 'high' ? 'badge-high' : label === 'medium' ? 'badge-medium' : 'badge-low';
  return <span className={`badge ${cls}`}>{label || 'unscored'}</span>;
};

const SeverityLabel = ({sev}) => {
  const cls = sev === 'critical' ? 'severity-critical' : sev === 'high' ? 'severity-high' : sev === 'medium' ? 'severity-medium' : 'severity-low';
  return <span className={cls}>{sev}</span>;
};

// ============ PAGES ============

function OverviewPage() {
  const m = DATA.dashboard_overview_metrics[0] || {};
  const salesByType = DATA.sales_summary_asset_type || [];
  const salesByMonth = (DATA.sales_summary_monthly || []).map(r => ({...r, total_volume: Number(r.total_volume)||0, deal_count: Number(r.deal_count)||0}));
  const rentBySub = DATA.rent_summary_submarket || [];
  const marketStats = DATA.market_stats_by_submarket || [];

  return <div>
    <div className="page-header">
      <h1>Platform Overview</h1>
      <p>Allegheny County Commercial Real Estate Intelligence</p>
    </div>
    <div className="kpi-grid">
      <div className="kpi-card"><div className="kpi-label">Sales Deals</div><div className="kpi-value text-primary">{fmt(m.sales_deals)}</div><div className="kpi-sub">Grouped commercial transactions</div></div>
      <div className="kpi-card"><div className="kpi-label">Total Volume</div><div className="kpi-value text-success">{fmtM(m.total_sales_volume)}</div><div className="kpi-sub">Aggregate deal value</div></div>

      <div className="kpi-card"><div className="kpi-label">Entities</div><div className="kpi-value text-accent">{fmt(m.entities)}</div><div className="kpi-sub">Resolved ownership entities</div></div>
      <div className="kpi-card"><div className="kpi-label">Review Items</div><div className="kpi-value text-danger">{fmt(m.review_items)}</div><div className="kpi-sub">QA flags pending review</div></div>
    </div>
    <div className="grid-2">
      <div className="card">
        <div className="card-title">Sales by Asset Type</div>
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={salesByType}>
            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
            <XAxis dataKey="asset_type" tick={{fill:'#94a3b8', fontSize:11}} />
            <YAxis tick={{fill:'#94a3b8', fontSize:11}} />
            <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #475569',borderRadius:8,color:'#f1f5f9'}} />

        <ResponsiveContainer width="100%" height={200}>
          <PieChart>
            <Pie data={sources.map((s,i)=>({name:s,value:raw.filter(r=>r.source_table===s).length,fill:COLORS[i%COLORS.length]}))} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={75} label={({name,percent})=>`${name.replace('transactions_','').substring(0,12)} ${(percent*100).toFixed(0)}%`} labelLine={{stroke:'#475569'}}>
              {sources.map((s,i)=><Cell key={i} fill={COLORS[i%COLORS.length]} />)}
            </Pie>
            <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #475569',borderRadius:8,color:'#f1f5f9'}} />
          </PieChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div className="filter-bar">
      <div><div className="filter-label">Severity</div><select value={sevFilter} onChange={e=>setSevFilter(e.target.value)}><option value="all">All</option>{sevs.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
      <div><div className="filter-label">Source</div><select value={sourceFilter} onChange={e=>setSourceFilter(e.target.value)}><option value="all">All</option>{sources.map(s=><option key={s} value={s}>{s}</option>)}</select></div>
      <div><div className="filter-label">Search</div><input placeholder="Issue description..." value={search} onChange={e=>setSearch(e.target.value)} /></div>
    </div>
    <div className="card">
      <div className="table-wrap">
        <table>
          <thead><tr><th>Severity</th><th>Source</th><th>Issue</th><th>Description</th><th>Action</th></tr></thead>
          <tbody>{filtered.map((r,i)=><tr key={i}>
            <td><SeverityLabel sev={r.severity} /></td>
            <td style={{fontSize:10,fontFamily:'monospace'}}>{r.source_table}</td>
            <td>{r.issue_type||'—'}</td>
            <td style={{maxWidth:300,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.issue_description||'—'}</td>
            <td style={{fontSize:11,color:'var(--text3)'}}>{r.suggested_action||'—'}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </div>
  </div>;
}

function MarketSummaryPage() {
  const salesMonthly = (DATA.sales_summary_monthly||[]).map(r=>({...r,total_volume:Number(r.total_volume)||0,deal_count:Number(r.deal_count)||0,avg_price_per_sf:Number(r.avg_price_per_sf)||0}));
  const salesByType = DATA.sales_summary_asset_type || [];
  const salesBySub = DATA.sales_summary_submarket || [];
  const rentMarket = DATA.rent_market_summary || [];
  const marketStats = DATA.market_stats_by_submarket || [];

  return <div>
    <div className="page-header"><h1>Market Summaries</h1><p>Aggregate market analytics across all data layers</p></div>
    <div className="grid-2">
      <div className="card">
        <div className="card-title">Monthly Sales Volume</div>
        <ResponsiveContainer width="100%" height={280}>
          <BarChart data={salesMonthly}>
            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
            <XAxis dataKey="sale_month" tick={{fill:'#94a3b8',fontSize:10}} angle={-45} textAnchor="end" height={60} />
            <YAxis tick={{fill:'#94a3b8',fontSize:11}} tickFormatter={v=>'$'+(v/1e6).toFixed(1)+'M'} />
            <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #475569',borderRadius:8,color:'#f1f5f9'}} formatter={v=>fmtM(v)} />
            <Bar dataKey="total_volume" fill="#3b82f6" radius={[4,4,0,0]} name="Volume" />
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div className="card">
        <div className="card-title">Avg $/SF by Month</div>
        <ResponsiveContainer width="100%" height={280}>
          <LineChart data={salesMonthly.filter(r=>r.avg_price_per_sf>0)}>
            <CartesianGrid strokeDasharray="3 3" stroke="#334155" />
            <XAxis dataKey="sale_month" tick={{fill:'#94a3b8',fontSize:10}} angle={-45} textAnchor="end" height={60} />
            <YAxis tick={{fill:'#94a3b8',fontSize:11}} tickFormatter={v=>'$'+v} />
            <Tooltip contentStyle={{background:'#1e293b',border:'1px solid #475569',borderRadius:8,color:'#f1f5f9'}} formatter={v=>'$'+Number(v).toFixed(0)} />
            <Line type="monotone" dataKey="avg_price_per_sf" stroke="#22c55e" strokeWidth={2} dot={{fill:'#22c55e'}} name="$/SF" />
          </LineChart>
        </ResponsiveContainer>
      </div>
    </div>
    <div className="grid-3">
      <div className="card">
        <div className="card-title">By Asset Type</div>
        <div className="table-wrap" style={{maxHeight:300}}>
          <table>
            <thead><tr><th>Type</th><th>Deals</th><th>Volume</th><th>Avg $/SF</th></tr></thead>
            <tbody>{salesByType.map((r,i)=><tr key={i}><td>{r.asset_type}</td><td>{fmt(r.deal_count)}</td><td>{fmtM(r.total_volume)}</td><td>{r.avg_price_per_sf ? '$'+Number(r.avg_price_per_sf).toFixed(0) : '—'}</td></tr>)}</tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="card-title">By Submarket (Sales)</div>
        <div className="table-wrap" style={{maxHeight:300}}>
          <table>
            <thead><tr><th>Submarket</th><th>Deals</th><th>Volume</th></tr></thead>
            <tbody>{salesBySub.map((r,i)=><tr key={i}><td>{r.submarket}</td><td>{fmt(r.deal_count)}</td><td>{fmtM(r.total_volume)}</td></tr>)}</tbody>
          </table>
        </div>
      </div>
      <div className="card">
        <div className="card-title">Market Stats</div>
        <div className="table-wrap" style={{maxHeight:300}}>
          <table>
            <thead><tr><th>Submarket</th><th>Deals</th><th>Avg $/SF</th></tr></thead>
            <tbody>{marketStats.map((r,i)=><tr key={i}><td>{r.submarket}</td><td>{fmt(r.deal_count)}</td><td>{r.avg_price_per_sf ? '$'+Number(r.avg_price_per_sf).toFixed(0) : '—'}</td></tr>)}</tbody>
          </table>
        </div>
      </div>
    </div>
  </div>;
}

// ============ APP SHELL ============

const PAGES = [
  { id: 'overview', label: 'Overview', icon: '📊', component: OverviewPage },
  { id: 'sales', label: 'Sales Comps', icon: '🏢', component: SalesCompsPage },
  { id: 'rents', label: 'Rent Proxies', icon: '📋', component: RentProxiesPage },
  { id: 'debt', label: 'Debt / Mortgage', icon: '🏦', component: DebtPage },
  { id: 'entities', label: 'Ownership', icon: '👥', component: EntitiesPage },
  { id: 'deals', label: 'Deal Sheets', icon: '📑', component: DealSheetsPage },
  { id: 'review', label: 'Review Queue', icon: '⚠️', component: ReviewQueuePage },
  { id: 'market', label: 'Market Summary', icon: '📈', component: MarketSummaryPage },
];

function App() {
  const [page, setPage] = useState('overview');
  const current = PAGES.find(p => p.id === page) || PAGES[0];
  const PageComponent = current.component;

  return <div className="app">
    <div className="sidebar">
      <div className="sidebar-logo">
        <h2>ALLEGHENY CRE</h2>
        <p>Intelligence Platform</p>
      </div>
      {PAGES.map(p => <div key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
        <span className="nav-icon">{p.icon}</span> {p.label}
      </div>)}
      <div style={{padding:'20px',borderTop:'1px solid var(--border)',marginTop:20}}>
        <div style={{fontSize:10,color:'var(--text3)'}}>Pipeline: Sample Data</div>
        <div style={{fontSize:10,color:'var(--text3)'}}>Last run: {new Date().toLocaleDateString()}</div>
      </div>
    </div>
    <div className="main">
      <PageComponent />
    </div>
  </div>;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
